services:
  server:
    image: voidic/route96:latest
    restart: unless-stopped
    ports:
      - "8000"
    volumes:
      - route96-data:/app/data
    environment:
      RUST_LOG: "info"
    configs:
      - source: route96-config
        target: /app/config.yaml
    depends_on:
      - db
    labels:
      yantr.app: "route96"
      yantr.service: "Media Server"

  db:
    image: mariadb:latest
    restart: unless-stopped
    volumes:
      - route96-db:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: "route96rootpass"
      MYSQL_USER: "route96"
      MYSQL_PASSWORD: "route96pass"
      MYSQL_DATABASE: "route96"
    labels:
      yantr.app: "route96"
      yantr.service: "Database"

configs:
  route96-config:
    content: |
      listen: "0.0.0.0:8000"
      database: "mysql://route96:route96pass@db:3306/route96"
      storage_dir: "./data"
      max_upload_bytes: 104857600
      public_url: "http://localhost:8000"

volumes:
  route96-data:
  route96-db:
