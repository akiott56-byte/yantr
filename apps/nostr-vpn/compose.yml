services:
  daemon:
    image: ghcr.io/mmalmi/nostr-vpn-umbrel:v4.0.47
    container_name: nostr-vpn-daemon
    restart: on-failure
    stop_grace_period: 1m
    network_mode: "host"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    entrypoint:
      - /usr/local/bin/nvpn
    command:
      - daemon
      - --config
      - /data/config/nvpn/config.toml
    environment:
      HOME: /data/home
      XDG_CONFIG_HOME: /data/config
      RUST_LOG: info
    volumes:
      - nostr_vpn_data:/data
    labels:
      yantr.app: "nostr-vpn"
      yantr.service: "VPN Daemon"

  web:
    image: ghcr.io/mmalmi/nostr-vpn-umbrel:v4.0.47
    container_name: nostr-vpn-web
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      - daemon
    ports:
      - "38080"
    environment:
      HOME: /data/home
      XDG_CONFIG_HOME: /data/config
      NVPN_CLI_PATH: /usr/local/bin/nvpn
      NVPN_DAEMON_STATUS_MODE: state-file
      NVPN_EXTERNAL_DAEMON: "true"
      RUST_LOG: info
    volumes:
      - nostr_vpn_data:/data
    labels:
      yantr.app: "nostr-vpn"
      yantr.service: "Web UI"

volumes:
  nostr_vpn_data:
