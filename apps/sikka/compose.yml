services:
  sikka:
    image: ghcr.io/sikkacrypto/sikka:latest
    container_name: sikka
    restart: unless-stopped
    labels:
      yantr.app: "sikka"
      yantr.service: "Node API and Wallet"
    environment:
      miner: ${miner:-}
      SIKKA_PUBLIC_URL: ${SIKKA_PUBLIC_URL:-}
    ports:
      - "8080"
    volumes:
      - sikka-data:/home/sikka/data

volumes:
  sikka-data: