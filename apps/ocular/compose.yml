services:
  ocular:
    image: ghcr.io/simonwep/ocular:v2
    container_name: ocular
    labels:
      yantr.app: "ocular"
      yantr.service: "Budget App"
    ports:
      - "80"
    environment:
      TZ: ${TZ:-UTC}
      GENESIS_JWT_TOKEN_EXPIRATION: ${GENESIS_JWT_TOKEN_EXPIRATION:-60}
      GENESIS_JWT_SECRET: ${GENESIS_JWT_SECRET}
      GENESIS_CREATE_USERS: "${OCULAR_ADMIN_USERNAME:-admin}!:${OCULAR_ADMIN_PASSWORD}"
      GENESIS_JWT_COOKIE_ALLOW_HTTP: ${GENESIS_JWT_COOKIE_ALLOW_HTTP:-false}
    volumes:
      - ocular_data:/data/genesis
    restart: unless-stopped

volumes:
  ocular_data: