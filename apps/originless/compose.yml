services:
  originless:
    image: ghcr.io/besoeasy/originless:latest
    init: true
    container_name: originless
    hostname: originless
    environment:
      STORAGE_MAX: ${STORAGE_MAX:-200GB}
    volumes:
      - originless:/app/data
    ports:
      - "3232"
      - "4001/tcp"
      - "4001/udp"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3232 || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    labels:
      yantr.app: "originless"
      yantr.service: "Storage Backend"

volumes:
  originless:
